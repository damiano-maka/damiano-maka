    <clipPath id="lcl16"><rect x="500" y="380" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="2.62s" fill="freeze"/></rect></clipPath>
    <clipPath id="lcl17"><rect x="500" y="402" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="2.74s" fill="freeze"/></rect></clipPath>

    <style>
      .ascii-l  { font-family: 'Consolas', 'Courier New', monospace; font-size: 8.5px; fill: url(#asciiGradLight); letter-spacing: -0.2px; }
      .key-l    { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #0284C7; font-weight: bold; }
      .value-l  { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #0F172A; }
      .cc-l     { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #94A3B8; }
      .head-l   { font-family: 'Consolas', 'Courier New', monospace; font-size: 16px; fill: #2563EB; font-weight: bold; }
      .accent-l { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #059669; font-weight: bold; }
      text, tspan { white-space: pre; }
      .term-label-l { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
      .scan-label-l { font-family: 'Consolas', 'Courier New', monospace; font-size: 10px; fill: #EF4444; letter-spacing: 1px; }
      .panel-title-l { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; fill: #0284C7; letter-spacing: 2px; opacity: 0.9; }
      .cursor-blink-l { fill: #0284C7; }
    </style>
  </defs>

  <!-- Background Canvas -->
  <rect width="1180" height="610" rx="18" fill="url(#bgGlowLight)"/>

  <!-- Top macOS Window Bar -->
  <g id="titlebar-light">
