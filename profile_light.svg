<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
  <defs>
    <!-- Dynamic Light Mode Gradients -->
    <linearGradient id="asciiGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7">
        <animate attributeName="stop-color" values="#0284C7;#2563EB;#06B6D4;#0284C7" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#2563EB">
        <animate attributeName="stop-color" values="#2563EB;#06B6D4;#0284C7;#2563EB" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="borderGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <radialGradient id="bgGlowLight" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </radialGradient>

    <linearGradient id="scanGradLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284C7" stop-opacity="0"/>
      <stop offset="45%" stop-color="#0284C7" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="#0284C7" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>

    <mask id="revealMaskLight" maskUnits="userSpaceOnUse" x="0" y="0" width="1180" height="620">
      <rect x="0" y="0" width="1180" height="0" fill="#fff">
        <animate attributeName="height" from="0" to="560" dur="2.4s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </mask>

    <clipPath id="lcl0"><rect x="500" y="26" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="0.70s" fill="freeze"/></rect></clipPath>
    <clipPath id="lcl1"><rect x="500" y="50" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="0.82s" fill="freeze"/></rect></clipPath>
    <clipPath id="lcl2"><rect x="500" y="72" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="0.94s" fill="freeze"/></rect></clipPath>
    <clipPath id="lcl3"><rect x="500" y="94" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.06s" fill="freeze"/></rect></clipPath>
    <clipPath id="lcl4"><rect x="500" y="116" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.18s" fill="freeze"/></rect></clipPath>
    <clipPath id="lcl5"><rect x="500" y="138" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.30s" fill="freeze"/></rect></clipPath>
    <clipPath id="lcl6"><rect x="500" y="160" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.42s" fill="freeze"/></rect></clipPath>
    <clipPath id="lcl7"><rect x="500" y="182" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.54s" fill="freeze"/></rect></clipPath>
    <clipPath id="lcl8"><rect x="500" y="204" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.66s" fill="freeze"/></rect></clipPath>
