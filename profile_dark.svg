<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
  <defs>
    <!-- Dynamic Animated Gradients -->
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#7C3AED;#38BDF8;#22D3EE" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#38BDF8;#22D3EE;#7C3AED" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="45%" stop-color="#22D3EE" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#A5F3FC" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#22D3EE" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#7DD3FC" opacity="0.04"/>
    </pattern>

    <mask id="revealMask" maskUnits="userSpaceOnUse" x="0" y="0" width="1180" height="620">
      <rect x="0" y="0" width="1180" height="0" fill="#fff">
        <animate attributeName="height" from="0" to="560" dur="2.4s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </mask>

    <!-- Typing Clip Paths for Sequential Terminal Line Reveals -->
    <clipPath id="lc0"><rect x="500" y="26" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="0.70s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc1"><rect x="500" y="50" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="0.82s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc2"><rect x="500" y="72" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="0.94s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc3"><rect x="500" y="94" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.06s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc4"><rect x="500" y="116" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.18s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc5"><rect x="500" y="138" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.30s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc6"><rect x="500" y="160" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.42s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc7"><rect x="500" y="182" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.54s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc8"><rect x="500" y="204" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.66s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc9"><rect x="500" y="226" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.78s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc10"><rect x="500" y="248" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="1.90s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc11"><rect x="500" y="270" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="2.02s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc12"><rect x="500" y="292" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="2.14s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc13"><rect x="500" y="314" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="2.26s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc14"><rect x="500" y="336" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="2.38s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc15"><rect x="500" y="358" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="2.50s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc16"><rect x="500" y="380" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="2.62s" fill="freeze"/></rect></clipPath>
    <clipPath id="lc17"><rect x="500" y="402" width="0" height="24"><animate attributeName="width" from="0" to="690" dur="0.35s" begin="2.74s" fill="freeze"/></rect></clipPath>

    <style>
      .ascii  { font-family: 'Consolas', 'Courier New', monospace; font-size: 8.5px; fill: url(#asciiGrad); letter-spacing: -0.2px; }
      .key    { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #22D3EE; font-weight: bold; }
      .value  { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #F8FAFC; }
      .cc     { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #475569; }
      .head   { font-family: 'Consolas', 'Courier New', monospace; font-size: 16px; fill: #7C3AED; font-weight: bold; }
      .accent { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #10B981; font-weight: bold; }
      text, tspan { white-space: pre; }
      .term-label { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; fill: #64748B; letter-spacing: 0.5px; }
      .scan-label { font-family: 'Consolas', 'Courier New', monospace; font-size: 10px; fill: #F87171; letter-spacing: 1px; }
      .panel-title { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; fill: #38BDF8; letter-spacing: 2px; opacity: 0.85; }
      .cursor-blink { fill: #22D3EE; }
    </style>
  </defs>

  <!-- Background Canvas -->
  <rect width="1180" height="610" rx="18" fill="url(#bgGlow)"/>
  <rect width="1180" height="610" rx="18" fill="url(#scanlines)"/>

  <!-- Top macOS-style Window Bar -->
  <g id="titlebar">
    <rect x="3" y="3" width="1174" height="34" rx="16" fill="#0B1120" fill-opacity="0.9"/>
    <circle cx="24" cy="20" r="5" fill="#EF4444"><animate attributeName="opacity" values="1;0.55;1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="42" cy="20" r="5" fill="#F59E0B"><animate attributeName="opacity" values="1;0.55;1" dur="4s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="20" r="5" fill="#10B981"><animate attributeName="opacity" values="1;0.55;1" dur="4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <text x="590" y="24" text-anchor="middle" class="term-label">damiano@devos ~ % ./profile.sh --live</text>
    <circle cx="1122" cy="20" r="4" fill="#F87171">
      <animate attributeName="opacity" values="1;0.15;1" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <text x="1132" y="23" class="scan-label">SYSTEM ONLINE</text>
  </g>

  <!-- Main Body Content -->
  <g transform="translate(0,38)">
    <rect x="14" y="26" width="488" height="468" rx="14" fill="#0F172A" fill-opacity="0.45" stroke="url(#borderGrad)" stroke-width="1"/>
    <rect x="508" y="10" width="655" height="500" rx="14" fill="#0F172A" fill-opacity="0.45" stroke="url(#borderGrad)" stroke-width="1"/>
    <text x="30" y="24" class="panel-title">PORTRAIT.MAP</text>
    <text x="524" y="24" class="panel-title">SYSTEM.INFO</text>

    <!-- LEFT SIDE: Animated Vector ASCII Portrait -->
    <g mask="url(#revealMask)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="6s" repeatCount="indefinite"/>
        <text x="32" y="55" class="ascii">
          <tspan x="32" y="75.00" xml:space="preserve">                           .........                          </tspan>
          <tspan x="32" y="86.50" xml:space="preserve">                        .''   .  .   ....                    </tspan>
          <tspan x="32" y="98.00" xml:space="preserve">                      '' .    . ..  ...   ...                </tspan>
          <tspan x="32" y="109.50" xml:space="preserve">                     ...                    ..                </tspan>
          <tspan x="32" y="121.00" xml:space="preserve">                       '-+*#%%%#*##*+=-:'                     </tspan>
          <tspan x="32" y="132.50" xml:space="preserve">                     '%██████████████████@*-                  </tspan>
          <tspan x="32" y="144.00" xml:space="preserve">                    '███████████████████████=                 </tspan>
          <tspan x="32" y="155.50" xml:space="preserve">                   .+███████████████████████%'.               </tspan>
          <tspan x="32" y="167.00" xml:space="preserve">                   -██#=-=*#████████████████%--'              </tspan>
          <tspan x="32" y="178.50" xml:space="preserve">                   :*-:----:#█████%-:::---@██*--'             </tspan>
          <tspan x="32" y="190.00" xml:space="preserve">                   .**--:':--%███#-::::--:-+#*--              </tspan>
          <tspan x="32" y="201.50" xml:space="preserve">                 ---█=#+  -'--██#:*-. -:--#' -.-=-            </tspan>
          <tspan x="32" y="213.00" xml:space="preserve">                 +@-███+   :█@███%█+  . @*%%#*=@@█:           </tspan>
          <tspan x="32" y="224.50" xml:space="preserve">                 '%*████%**@█████@█@-:'=█████@%=██.           </tspan>
          <tspan x="32" y="236.00" xml:space="preserve">                   -█████████████████████████@@@@-            </tspan>
          <tspan x="32" y="247.50" xml:space="preserve">                '-::██████*-':+:'-=@████████==#=.             </tspan>
          <tspan x="32" y="259.00" xml:space="preserve">               -#+---+████+=+#@#+-:=██████#:                  </tspan>
          <tspan x="32" y="270.50" xml:space="preserve">               +█*--  :=*'+██-':███*=██%=-                    </tspan>
          <tspan x="32" y="282.00" xml:space="preserve">                -+#█-      ::   :--  '.                       </tspan>
          <tspan x="32" y="293.50" xml:space="preserve">                  -#-'..                                      </tspan>
          <tspan x="32" y="305.00" xml:space="preserve">               -%%@%@@@%%%*+  --'                             </tspan>
          <tspan x="32" y="316.50" xml:space="preserve">             :++████████████-'.'.                             </tspan>
          <tspan x="32" y="328.00" xml:space="preserve">             %█*█████@@████@*#*=%*' '                         </tspan>
          <tspan x="32" y="339.50" xml:space="preserve">            -█*+█*-%@:%+*██%.%█████#%:                        </tspan>
          <tspan x="32" y="351.00" xml:space="preserve">             @%+█+-@-*█=-@█#-@██████-'                        </tspan>
          <tspan x="32" y="362.50" xml:space="preserve">             :=*███%+█@%███*:@██████=                         </tspan>
          <tspan x="32" y="374.00" xml:space="preserve">               *███████████%-*█████%:                         </tspan>
          <tspan x="32" y="385.50" xml:space="preserve">               .-=*#%%%%%#+'  .'--'                           </tspan>
        </text>
      </g>
    </g>

    <!-- RIGHT SIDE: Typewritten Details -->
    <g clip-path="url(#lc0)"><text x="520" y="0"><tspan x="520" y="42" class="head">damiano@devos</tspan><tspan class="cc"> -------------------------------------------</tspan></text></g>
    <g clip-path="url(#lc1)"><text x="520" y="0"><tspan x="520" y="66" class="cc">. </tspan><tspan class="key">Subject</tspan><tspan class="cc">: .......................... </tspan><tspan class="value">Damiano Maka</tspan></text></g>
    <g clip-path="url(#lc2)"><text x="520" y="0"><tspan x="520" y="88" class="cc">. </tspan><tspan class="key">Role</tspan><tspan class="cc">: ............................. </tspan><tspan class="value">Frontend &amp; AI Developer</tspan></text></g>
    <g clip-path="url(#lc3)"><text x="520" y="0"><tspan x="520" y="110" class="cc">. </tspan><tspan class="key">Company</tspan><tspan class="cc">: .......................... </tspan><tspan class="value">GenomeUp S.r.l. (JuliaOmix SaaS)</tspan></text></g>
    <g clip-path="url(#lc4)"><text x="520" y="0"><tspan x="520" y="132" class="cc">. </tspan><tspan class="key">Origin</tspan><tspan class="cc">: ........................... </tspan><tspan class="value">Rome, Italy (Hybrid/Remote)</tspan></text></g>
    <g clip-path="url(#lc5)"><text x="520" y="0"><tspan x="520" y="154" class="cc">. </tspan><tspan class="key">Focus</tspan><tspan class="cc">: ............................ </tspan><tspan class="value">Micro-frontends &amp; AI Automations</tspan></text></g>
    <g clip-path="url(#lc6)"><text x="520" y="0"><tspan x="520" y="176" class="cc">. </tspan><tspan class="key">Education</tspan><tspan class="cc">: ......................... </tspan><tspan class="value">LabForWeb • Rizzo AI Academy</tspan></text></g>
    <g clip-path="url(#lc7)"><text x="520" y="0"><tspan x="520" y="198" class="cc">. </tspan></text></g>
    <g clip-path="url(#lc8)"><text x="520" y="0"><tspan x="520" y="220" class="cc">. </tspan><tspan class="key">Core</tspan><tspan class="cc">.</tspan><tspan class="key">Frontend</tspan><tspan class="cc">: ...... </tspan><tspan class="value">Angular v17+, TS, RxJS, Signals</tspan></text></g>
    <g clip-path="url(#lc9)"><text x="520" y="0"><tspan x="520" y="242" class="cc">. </tspan><tspan class="key">Core</tspan><tspan class="cc">.</tspan><tspan class="key">Arch</tspan><tspan class="cc">: .......... </tspan><tspan class="value">Nx Monorepo, AG Grid, Storybook</tspan></text></g>
    <g clip-path="url(#lc10)"><text x="520" y="0"><tspan x="520" y="264" class="cc">. </tspan><tspan class="key">Core</tspan><tspan class="cc">.</tspan><tspan class="key">AI/Tools</tspan><tspan class="cc">: ...... </tspan><tspan class="value">Claude Code, Gemini, MCP, Codex</tspan></text></g>
    <g clip-path="url(#lc11)"><text x="520" y="0"><tspan x="520" y="286" class="cc">. </tspan><tspan class="key">Core</tspan><tspan class="cc">.</tspan><tspan class="key">DevOps</tspan><tspan class="cc">: ........ </tspan><tspan class="value">Docker, AWS, Bitbucket CI/CD, Git</tspan></text></g>
    <g clip-path="url(#lc12)"><text x="520" y="0"><tspan x="520" y="308" class="cc">. </tspan></text></g>
    <g clip-path="url(#lc13)"><text x="520" y="0"><tspan x="520" y="330" class="accent">- Connect</tspan><tspan class="cc"> ---------------------------------------------</tspan></text></g>
    <g clip-path="url(#lc14)"><text x="520" y="0"><tspan x="520" y="352" class="cc">. </tspan><tspan class="key">Grid</tspan><tspan class="cc">.</tspan><tspan class="key">Mail</tspan><tspan class="cc">: ....................... </tspan><tspan class="value">makadamiano@gmail.com</tspan></text></g>
    <g clip-path="url(#lc15)"><text x="520" y="0"><tspan x="520" y="374" class="cc">. </tspan><tspan class="key">Grid</tspan><tspan class="cc">.</tspan><tspan class="key">LinkedIn</tspan><tspan class="cc">: ................... </tspan><tspan class="value">linkedin.com/in/damiano-maka</tspan></text></g>
    <g clip-path="url(#lc16)"><text x="520" y="0"><tspan x="520" y="396" class="cc">. </tspan><tspan class="key">Grid</tspan><tspan class="cc">.</tspan><tspan class="key">Github</tspan><tspan class="cc">: ..................... </tspan><tspan class="value">github.com/damiano-maka</tspan></text></g>
    <g clip-path="url(#lc17)"><text x="520" y="0"><tspan x="520" y="418" class="cc">. </tspan><tspan class="value">Building enterprise micro-frontends &amp; AI tools ⚡</tspan></text></g>

    <!-- Blinking Cursor -->
    <rect x="522" y="427" width="9" height="16" class="cursor-blink" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.01;0.02;0.3;0.5;0.7;0.85;1" dur="1.4s" begin="3.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Animated Moving Scanline -->
  <rect x="0" y="-70" width="1180" height="70" fill="url(#scanGrad)" opacity="0.6" style="mix-blend-mode:screen">
    <animateTransform attributeName="transform" type="translate" from="0 -70" to="0 680" dur="4.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Outer Shimmer Border -->
  <rect x="3" y="3" width="1174" height="604" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="1.8" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/>
  </rect>
